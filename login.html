<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STR∆Y Labs — Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="center-auth-layout">
    <div class="dot-grid"></div>

    <div class="auth-card">
        <a href="index.html" class="link-back">← Volver</a>
        <div class="auth-brand">STR∆Y Labs</div>
        <h2>Control de Acceso</h2>
        <p class="auth-desc">Identifícate para entrar en el entorno restringido de tus proyectos activos.</p>

        <form id="form-login" class="interactive-form">
            <div class="field-group">
                <label for="login-email">CORREO ELECTRÓNICO</label>
                <input type="email" id="login-email" required placeholder="tu@email.com">
            </div>
            <div class="field-group">
                <label for="login-pass">CONTRASEÑA</label>
                <input type="password" id="login-pass" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-core block-btn">Autenticar Credenciales ↗</button>
        </form>
        <div class="auth-switcher">
            ¿No tienes un espacio? <a href="registro.html">Regístrate gratis</a>
        </div>
    </div>

    <div id="toast-wrapper"></div>
    <script src="script.js" type="module"></script>
</body>
</html>
